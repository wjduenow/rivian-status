; rivian-status — headless ESP32-S3 Rivian charge/range status light.
; See plans/01-rivian-status-plan.md for the full architecture.
;
; Phase 1 (this env): auth smoke-test. Hard-code creds in include/secrets.h, then:
;   pio run -e phase1 -t upload -t monitor
; It runs CSRF -> Login -> (OTP over serial) -> getUserInfo -> getVehicleState once,
; prints the raw responses, and records the Phase 1 deliverables (distanceToEmpty units,
; chargerState/chargePortState enum values). See plan §10.

[platformio]
default_envs = phase1

[env]
; NB: `platform` is deliberately UNPINNED here, but CI pins it (see .github/workflows/firmware.yml,
; env PLATFORM) by pre-installing the version this repo is developed against so the unpinned
; requirement resolves to it. Bump both together.
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Inject FW_VERSION (git describe) into every build — shown on the phase3 status page footer.
extra_scripts = pre:tools/git_version.py

; Serial over the native USB-C port (matches the sonos-nest boards). If the monitor is
; silent, your board may expose only the UART bridge — flip this to 0 and re-flash.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DDEVICE_HOSTNAME=\"rivian-status\"
    -I include
    -I src

lib_deps =
    bblanchon/ArduinoJson@^7.1.0

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; --- phase1: headless auth + telemetry smoke-test over serial ---
[env:phase1]
build_flags =
    ${env.build_flags}
    -DPHASE1_SMOKE_TEST

; --- phase2: continuous poll loop + backoff + lowRange check, serial-only (plan §5/§6) ---
; RANGE_THRESHOLD_X is a compile-time default in MILES (the API returns km; firmware converts —
; Phase 1 confirmed 2026-07-21). Becomes NVS-configurable via the web page in Phase 4.
[env:phase2]
build_flags =
    ${env.build_flags}
    -DPHASE2_POLL_LOOP
    -DRANGE_THRESHOLD_X=50

; --- phase3: browser UI (status + login + config) + poll task + WiFi provisioning + OTA + LEDs ---
[env:phase3]
build_flags =
    ${env.build_flags}
    -DPHASE3_WEBAPP
    -DLED_DATA_PIN=9
    -DLED_COUNT=8
    -DLED_BRIGHTNESS=40
lib_deps =
    ${env.lib_deps}
    fastled/FastLED@^3.7.0

; --- phase6-ledtest: standalone WS2812 wiring smoke-test on D10/GPIO9 (plan §7). Compiles
;     ONLY src/ledtest.cpp (no WiFi/Rivian). Flash, watch the 8 pixels wipe then rainbow:
;       pio run -e phase6-ledtest -t upload --upload-port /dev/ttyACM0
;     Restore the appliance after with:  pio run -e phase3 -t upload --upload-port /dev/ttyACM0
[env:phase6-ledtest]
build_src_filter = -<*> +<ledtest.cpp>
build_flags =
    ${env.build_flags}
    -DPHASE6_LEDTEST
    -DLED_DATA_PIN=9
    -DLED_COUNT=8
lib_deps =
    fastled/FastLED@^3.7.0

; --- phase3-ota: wireless (ArduinoOTA/espota) upload of the phase3 app. Usage:
;       OTA_PASSWORD=<your-pw> pio run -e phase3-ota -t upload
;     Override the target with --upload-port <name>.local if you renamed the device.
;     (OTA_PASSWORD comes from your env, not the repo; it must match secrets.h.)
[env:phase3-ota]
extends = env:phase3
upload_protocol = espota
upload_port = rivian-status.local
upload_flags = --auth=${sysenv.OTA_PASSWORD}
